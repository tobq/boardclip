name: Build desktop binaries

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows
            runner: windows-2025
            script: dist:win
            artifacts: |
              dist/*.exe
          - name: macOS Intel
            runner: macos-13
            script: dist:mac
            artifacts: |
              dist/*.dmg
              dist/*.zip
          - name: macOS Apple Silicon
            runner: macos-15
            script: dist:mac
            artifacts: |
              dist/*.dmg
              dist/*.zip
          - name: Linux
            runner: ubuntu-24.04
            script: dist:linux
            artifacts: |
              dist/*.AppImage
              dist/*.deb

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build binaries
        run: npm run ${{ matrix.platform.script }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: boardclip-${{ matrix.platform.name }}
          path: ${{ matrix.platform.artifacts }}
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.platform.artifacts }}

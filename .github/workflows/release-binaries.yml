name: Build desktop binaries

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows
            runner: windows-2025
            script: dist:win
            prepare_assets: |
              New-Item -ItemType Directory -Force release | Out-Null
              Copy-Item "dist/BoardClip Setup *.exe" "release/BoardClip-Setup-Windows.exe"
              Copy-Item (Get-ChildItem dist -Filter "*.exe" | Where-Object { $_.Name -notlike "*Setup*" } | Select-Object -First 1).FullName "release/BoardClip-Windows-Portable.exe"
            artifacts: |
              release/*.exe
          - name: macOS Intel
            runner: macos-15-intel
            script: dist:mac
            prepare_assets: |
              New-Item -ItemType Directory -Force release | Out-Null
              Copy-Item "dist/BoardClip-*.dmg" "release/BoardClip-macOS-Intel.dmg"
              Copy-Item "dist/BoardClip-*-mac.zip" "release/BoardClip-macOS-Intel.zip"
            artifacts: |
              release/*.dmg
              release/*.zip
          - name: macOS Apple Silicon
            runner: macos-15
            script: dist:mac
            prepare_assets: |
              New-Item -ItemType Directory -Force release | Out-Null
              Copy-Item "dist/BoardClip-*-arm64.dmg" "release/BoardClip-macOS-Apple-Silicon.dmg"
              Copy-Item "dist/BoardClip-*-arm64-mac.zip" "release/BoardClip-macOS-Apple-Silicon.zip"
            artifacts: |
              release/*.dmg
              release/*.zip
          - name: Linux
            runner: ubuntu-24.04
            script: dist:linux
            prepare_assets: |
              New-Item -ItemType Directory -Force release | Out-Null
              Copy-Item "dist/BoardClip-*.AppImage" "release/BoardClip-Linux.AppImage"
              Copy-Item "dist/boardclip_*_amd64.deb" "release/BoardClip-Linux.deb"
            artifacts: |
              release/*.AppImage
              release/*.deb

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build binaries
        run: npm run ${{ matrix.platform.script }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Prepare release assets
        shell: pwsh
        run: ${{ matrix.platform.prepare_assets }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: boardclip-${{ matrix.platform.name }}
          path: ${{ matrix.platform.artifacts }}
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.platform.artifacts }}

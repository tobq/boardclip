<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Editor</title>
<script>
  document.documentElement.dataset.theme = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
</script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
<!-- Vendored CodeMirror 5 merge view (offline, shared with the website demo);
     powers the shared reconciliation/unify UI. Load before clipboard-ui-core. -->
<link rel="stylesheet" href="site/shared/vendor/cm5/codemirror.css">
<link rel="stylesheet" href="site/shared/vendor/cm5/merge.css">
<script src="site/shared/vendor/cm5/codemirror.js"></script>
<script src="site/shared/vendor/cm5/diff-match-patch.js"></script>
<script src="site/shared/vendor/cm5/merge.js"></script>
<link rel="stylesheet" href="site/shared/clipboard-popup.css">
<style>
  /* Editor window shell only; the editor itself + theme vars come from the
     shared clipboard-popup.css + Core.createEditor (single source with demo). */
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; overflow:hidden; }
  body { font-family:system-ui,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); }
  /* Frosted glass, same as the popup: the OS blurs behind a transparent window;
     this scrim just tints for legibility. */
  :root[data-surface="glass"] body { background:transparent; }
  :root[data-surface="glass"] body::before {
    content:""; position:fixed; inset:0; z-index:-1; background:var(--glass-tint);
    backdrop-filter:var(--glass-blur); -webkit-backdrop-filter:var(--glass-blur);
  }
  @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
    :root[data-surface="glass"] body { background:var(--surface); }
    :root[data-surface="glass"] body::before { display:none; }
  }
  #editorHost { height:100%; }
  ::-webkit-scrollbar { width:10px; }
  ::-webkit-scrollbar-thumb { background:var(--line-strong); border-radius:5px; }
</style></head><body>
<div id="editorHost"></div>
<script src="site/shared/clip-search.js"></script>
<script src="site/shared/clipboard-ui-core.js"></script>
<script>
const Core = window.BoardClipCore;
const host = document.getElementById('editorHost');

// Theme: follow the app's theme_mode setting + live system changes, exactly
// like the popup (Core.applyTheme on <html>).
let themeMode = 'system';
let systemDark = matchMedia('(prefers-color-scheme: dark)').matches;
function refreshTheme() { Core.applyTheme(document.documentElement, themeMode, systemDark); }
if (window.editorApi.getColorScheme) window.editorApi.getColorScheme().then((s) => { systemDark = s !== 'light'; refreshTheme(); }).catch(() => {});
if (window.editorApi.onColorSchemeChanged) window.editorApi.onColorSchemeChanged((s) => { systemDark = s !== 'light'; refreshTheme(); });

let editor = null;
let reconcileView = null;

// --- Shared clip menu (pin/group/numpad/title/delete), same as the popup rows
// and the image viewer. Backed by a light state snapshot fetched right before
// the menu opens (the clip id changes on every committed edit, so the CURRENT
// id comes from main at open time too). context 'editor' hides "Open in editor".
let menuState = { item: null, items: [], groups: [], aiGroup: 'AI' };
let menuClipId = null;
const menuAdapter = {
  menuContext: 'editor',
  itemById: (id) => menuState.items.find((it) => Core.itemId(it) === id) || null,
  allItems: () => menuState.items,
  groupNames: () => menuState.groups,
  numpadMap: () => Core.numpadMap(menuState.items),
  protectedGroups: () => new Set([menuState.aiGroup]),
  pin: (id) => window.editorApi.pin(id),
  toggleGroup: (id, group) => window.editorApi.groupAssign(id, group),
  createGroup: (name) => window.editorApi.groupCreate(name),
  numpadAssign: (id, slot) => window.editorApi.numpadAssign(id, slot),
  numpadUnassign: (slot) => window.editorApi.numpadUnassign(slot),
  // The editor's title INPUT is authoritative (it rides every commit); a menu
  // rename would be reverted by the next commit if it only touched the clip.
  // Set the input + commit through the session instead — one write path.
  setClipTitle: (_id, title) => { if (editor) { editor.setTitle(title); editor.commit(); } },
  // Delete closes the window; main suppresses the close-commit so the draft
  // can't resurrect the clip.
  deleteClips: async () => { await window.editorApi.deleteSelf(); return []; },
  render: () => {},
  refresh: async () => { menuState = await window.editorApi.state(menuClipId); },
};
const menuController = Core.createClipController(menuAdapter);
document.addEventListener('click', (e) => menuController.onClick(e));
async function openClipMenu(x, y) {
  menuClipId = await window.editorApi.currentId();
  if (!menuClipId) return; // new note not committed yet — no clip to act on
  menuState = await window.editorApi.state(menuClipId);
  menuController.openClipMenu(menuClipId, x, y);
}

window.editorApi.onInit((init) => {
  themeMode = (init.themeMode === 'light' || init.themeMode === 'dark') ? init.themeMode : 'system';
  refreshTheme();
  // Frosted glass + the other appearance axes, matching the popup.
  Core.applyVariants(document.documentElement, {
    surfaceStyle: init.surfaceStyle, accentVariant: init.accentVariant, uiDensity: init.uiDensity, uiCorners: init.uiCorners, uiBorders: init.uiBorders,
  });
  host.innerHTML = '';
  reconcileView = null;
  editor = Core.createEditor({
    initialText: init.text || '',
    initialTitle: init.noteTitle || '',
    initialFind: init.find || '',
    initialFindRegex: !!init.findRegex,
    initialFocusTitle: !!init.focusTitle,
    title: init.title || (init.isNew ? 'New clip' : 'Edit clip'),
    onInput: (payload) => window.editorApi.draft(payload),     // live crash-safe draft, every keystroke
    onCommit: (payload) => window.editorApi.commit(payload),   // idle / Ctrl+S / close -> write the clip
    onClose: () => window.editorApi.close(),
    // "..." in the editor chrome -> the shared clip menu (existing clips only;
    // a brand-new note has no clip until its first commit).
    ...(init.isNew ? {} : { onMenu: (x, y) => openClipMenu(x, y) }),
  });
  host.appendChild(editor.el);
  editor.focus();
});

// Right-click in the editor chrome (bar/foot — not the text area, where the
// native text menu belongs) opens the same clip menu.
document.addEventListener('contextmenu', (e) => {
  if (e.target.closest('.bc-editor-area, .bc-note-title, .bc-find-input, input, textarea')) return;
  if (!editor || reconcileView) return;
  e.preventDefault();
  openClipMenu(e.clientX, e.clientY);
});

if (window.editorApi.onFind) {
  window.editorApi.onFind((find) => {
    if (!editor || !find) return;
    if (find.focusTitle && editor.focusTitle) editor.focusTitle();
    else if (find.query) editor.openFind(find.query, !!find.regex);
  });
}

if (window.editorApi.onConflict) {
  // Mounts the SHARED reconciliation view for both a sync conflict (resolve +
  // close) and a Unify session (record.unify: fold each step, only close on the
  // final merge). One view, two drivers.
  function mountReconcile(record) {
    host.innerHTML = '';
    editor = null;
    reconcileView = Core.createReconciliationView({
      record,
      onResolve: async (resolution) => {
        if (record.unify && window.editorApi.unifyStep) {
          const next = await window.editorApi.unifyStep(resolution);
          if (next && next.done === false && next.nextRecord) { mountReconcile(next.nextRecord); return; }
          window.editorApi.close();
          return;
        }
        await window.editorApi.resolveConflict(resolution);
        window.editorApi.close();
      },
      onClose: () => window.editorApi.close(),
    });
    host.appendChild(reconcileView.el);
  }
  window.editorApi.onConflict((record) => {
    if (!record || !record.id) return;
    mountReconcile(record);
  });
}

// Commit any pending edit if the window is closing out from under us.
window.addEventListener('beforeunload', () => { if (editor) editor.commit(); });
</script>
</body></html>

<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Clipboard</title>
<script>
  document.documentElement.dataset.theme = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
</script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
<link rel="stylesheet" href="site/shared/clipboard-popup.css">
<style>
  /* Popup theme variables + all popup component styles live in the shared
     site/shared/clipboard-tokens.css + clipboard-popup.css (single source of
     truth with the website demo). Only the app-window shell + the frosted-glass
     scrim stay here. */
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; overflow:hidden; }
  body { font-family:system-ui,'Segoe UI',sans-serif; color:var(--text); display:flex; flex-direction:column; background:var(--bg); }
  /* Glass: the OS provides the real blur (macOS vibrancy / Windows 11 acrylic)
     behind a transparent window; this scrim only tints for legibility. */
  :root[data-surface="glass"] body { background:transparent; }
  :root[data-surface="glass"] body::before {
    content:""; position:fixed; inset:0; z-index:-1; background:var(--glass-tint);
    backdrop-filter:var(--glass-blur); -webkit-backdrop-filter:var(--glass-blur);
  }
  @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
    :root[data-surface="glass"] body { background:var(--surface); }
    :root[data-surface="glass"] body::before { display:none; }
  }
  ::-webkit-scrollbar { width:0; }
  #popupShell { flex:1; min-height:0; height:100%; display:flex; flex-direction:column; overflow:hidden; }
</style></head><body>

<div id="popupShell"></div>

<!-- Confirm + prompt dialogs are created by the shared Core.createDialogs. -->
<div class="toast" id="toast">Copied</div>

<script src="site/shared/clipboard-ui-core.js"></script>
<script>
const Core = window.BoardClipCore;
document.getElementById('popupShell').innerHTML = Core.renderPopupShell({
  settingsBodyHtml: Core.renderSettingsBody(),
  headerActionsHtml: '<button class="icon-btn accent" id="newNoteBtn" type="button" title="New note" aria-label="New note"><span class="mi">edit_note</span></button>',
});
const listEl = document.getElementById('list');
const toast = document.getElementById('toast');
const searchEl = document.getElementById('search');
const countEl = document.getElementById('count');
const regexBtn = document.getElementById('regexBtn');
let toastTimer, items = [], query = '', regexOn = false;
const BATCH = 30;
let rendered = 0, filtered = [];
let groups = [], activeFilters = new Set(), excludedFilters = new Set();
let controller = null;
let dataRevision = -1;
let diagnosticsEnabled = false;
let searchTexts = [], searchTextLower = [];
let itemLookup = new Map(), groupCounts = new Map(), builtinCounts = {}, numpadIdMap = {};

document.getElementById('newNoteBtn').addEventListener('click', () => {
  window.api.newNote({ sourceGroups: Core.sourceGroupsFromFilters(activeFilters) });
});

function recordRendererPerf(event, startedAt, details = {}, thresholdMs = 50) {
  const ms = performance.now() - startedAt;
  if (!diagnosticsEnabled && ms < thresholdMs) return ms;
  const promise = window.api.recordDiagnostics?.(event, {
    ...details,
    ms: Math.round(ms),
    items: items.length,
    filtered: filtered.length,
    query_length: query.length,
    filters: activeFilters.size + excludedFilters.size,
    slow: ms >= thresholdMs,
  });
  if (promise && promise.catch) promise.catch(() => {});
  return ms;
}

let themeMode = 'system';
let systemDark = matchMedia('(prefers-color-scheme: dark)').matches;
function refreshTheme() {
  Core.applyTheme(document.documentElement, themeMode, systemDark);
  Core.setActiveThemeSeg(document.getElementById('themeMode'), themeMode);
}
function applyColorScheme(scheme) {
  systemDark = scheme !== 'light';
  refreshTheme();
}
function setThemeMode(mode) {
  themeMode = (mode === 'light' || mode === 'dark') ? mode : 'system';
  refreshTheme();
}
if (window.api.getColorScheme) window.api.getColorScheme().then(applyColorScheme).catch(() => {});
if (window.api.onColorSchemeChanged) window.api.onColorSchemeChanged(applyColorScheme);
// Appearance variants: surface (glass/solid, resolved by main against OS support),
// plus dev-only accent/density/corners/borders. All ride data-* on <html>.
function applyAppearance(s) {
  if (!s) return;
  const rt = s.runtime_info || {};
  Core.applyVariants(document.documentElement, {
    surfaceStyle: rt.surface_style || 'solid',
    accentVariant: s.accent_variant,
    uiDensity: s.ui_density,
    uiCorners: s.ui_corners,
    uiBorders: s.ui_borders,
  });
}
if (window.api.getSettings) window.api.getSettings().then(s => { if (s) { if (s.theme_mode) setThemeMode(s.theme_mode); applyAppearance(s); } }).catch(() => {});
if (window.api.onSurfaceChanged) window.api.onSurfaceChanged((style) => document.documentElement.setAttribute('data-surface', style === 'solid' ? 'solid' : 'glass'));

// --- Helpers ---
function ago(ts) { return Core.ago(ts); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function providerName(acc) {
  const provider = acc && acc.provider ? String(acc.provider) : 'cloud';
  return provider.charAt(0).toUpperCase() + provider.slice(1);
}
function syncAccountLabel(acc) {
  if (acc && acc.provider === 'custom') return `Custom folder · ${acc.label || acc.path}`;
  return `${providerName(acc)} · ${acc.label || acc.email || acc.path}`;
}
// --- Pin model helpers ---
// item.pin: null/undefined = unpinned. Object = pinned. Shape: { number?: 1-9, groups?: string[] }
function isPinned(item) { return Core.isPinned(item); }
function numpadOf(item) { return Core.numpadOf(item); }
function groupsOf(item) { return Core.groupsOf(item); }
function itemId(item) { return Core.itemId(item); }
function itemById(id) { return itemLookup.get(id) || items.find(it => itemId(it) === id); }
function showToast(msg) { toast.textContent = msg||'Copied'; toast.classList.add('show'); clearTimeout(toastTimer); toastTimer = setTimeout(()=>toast.classList.remove('show'),1200); }

function rebuildItemIndexes() {
  const startedAt = performance.now();
  searchTexts = [];
  searchTextLower = [];
  itemLookup = new Map();
  groupCounts = new Map();
  builtinCounts = { __pinned__: 0, __numbered__: 0, __images__: 0 };
  numpadIdMap = {};

  items.forEach((item) => {
    const id = itemId(item);
    if (id) itemLookup.set(id, item);
    if (isPinned(item)) builtinCounts.__pinned__ += 1;
    if (item && item.type === 'image') builtinCounts.__images__ += 1;
    const slot = numpadOf(item);
    if (slot != null) {
      builtinCounts.__numbered__ += 1;
      numpadIdMap[slot] = id;
    }
    groupsOf(item).forEach((group) => groupCounts.set(group, (groupCounts.get(group) || 0) + 1));
    const searchText = Core.itemSearchText(item);
    searchTexts.push(searchText);
    searchTextLower.push(searchText.toLowerCase());
  });
  recordRendererPerf('indexes.rebuild', startedAt, {
    search_text_bytes: searchTexts.reduce((sum, text) => sum + text.length, 0),
    groups: groupCounts.size,
    numbered: builtinCounts.__numbered__ || 0,
    images: builtinCounts.__images__ || 0,
  }, 75);
}

// --- Numpad slot map ---
function numpadMap() {
  return numpadIdMap;
}

// --- Group filter tags ---
function renderGroupFilters() {
  const startedAt = performance.now();
  const el = document.getElementById('groupFilters');
  el.innerHTML = Core.renderFilterBar({ items, groups, activeFilters, excludedFilters, query, builtinCounts, groupCounts });
  recordRendererPerf('filters.render_bar', startedAt, { groups: groups.length }, 40);
}

function applyFilter() {
  const startedAt = performance.now();
  filtered = Core.filterItemIndexes(items, { query, regex: regexOn, filters: activeFilters, excludedFilters, searchTexts, searchTextLower });
  rendered = 0;
  listEl.innerHTML = '';
  loadBatch();
  if (!filtered.length) listEl.innerHTML = `<div class="empty">${query || Core.hasActiveFilters({ filters: activeFilters, excludedFilters }) ? 'No matches' : 'Copy something to get started'}</div>`;
  recordRendererPerf('list.apply_filter', startedAt, { rendered, regex: regexOn }, 60);
}

let rerenderFrame = null;
function rerenderList() {
  const startedAt = performance.now();
  if (rerenderFrame) {
    cancelAnimationFrame(rerenderFrame);
    rerenderFrame = null;
  }
  renderGroupFilters();
  applyFilter();
  updateCount();
  if (controller) controller.repaintSelection(); // refresh the selection bar after a rebuild
  scheduleRelativeTimeRefresh();
  recordRendererPerf('list.rerender', startedAt, { rendered }, 90);
}

function scheduleRerenderList() {
  if (rerenderFrame) return;
  rerenderFrame = requestAnimationFrame(() => {
    rerenderFrame = null;
    rerenderList();
  });
}

function loadBatch() {
  const startedAt = performance.now();
  const end = Math.min(rendered + BATCH, filtered.length);
  const batch = end - rendered;
  const nmap = numpadMap();
  const frag = document.createDocumentFragment();
  for (let fi = rendered; fi < end; fi++) {
    const ri = filtered[fi];
    const it = items[ri];
    frag.appendChild(buildItem(it, ri, nmap));
  }
  listEl.appendChild(frag);
  rendered = end;
  scheduleRelativeTimeRefresh();
  recordRendererPerf('list.load_batch', startedAt, { batch, rendered }, 60);
}

let relativeTimeTimer = null;
function scheduleRelativeTimeRefresh() {
  if (relativeTimeTimer) clearTimeout(relativeTimeTimer);
  const delay = Core.updateRelativeTimes(listEl);
  if (delay) {
    relativeTimeTimer = setTimeout(scheduleRelativeTimeRefresh, delay);
  }
}

function buildItem(it, ri, nmap) {
  const id = itemId(it);
  const el = document.createElement('div');
  const pickerHtml = Core.renderItemPicker(it, { items, groups, numpadMap: nmap });
  const actionsHtml = Core.renderClipActions(it);
  // Read the multi-select state so a full rebuild keeps the focus cursor +
  // checked rows painted (selection lives in the shared controller).
  const sel = controller ? controller.selection() : null;
  el.innerHTML = Core.renderClipItem(it, {
    imageSrc: item => `clip-img:///${esc(item.image)}`,
    previewText: item => Core.collapsedPreviewText(item.text || '', query, regexOn),
    highlight: text => Core.highlight(text, query, regexOn),
    highlightTitle: text => Core.highlight(text, query, regexOn),
    selected: !!(sel && sel.focusId === id),
    multiSelected: !!(sel && sel.selectedIds.has(id)),
    pickerHtml,
    actionsHtml,
  });
  return el.firstElementChild;
}

function updateCount() {
  const total = items.length;
  const visible = filtered.length;
  countEl.textContent = Core.itemCountLabel(total, visible, { query, filters: activeFilters, excludedFilters });
}

function updateClearControls() {
  searchClear.classList.toggle('show', !!query);
  searchClear.title = Core.hasActiveFilters({ filters: activeFilters, excludedFilters }) ? 'Clear search and filters' : 'Clear search';
}

function clearSearchAndFilters() {
  searchEl.value = '';
  query = '';
  Core.clearFilterState({ filters: activeFilters, excludedFilters });
  if (controller) controller.clearSelection({ paint: false });
  updateClearControls();
  rerenderList();
}

window.focusSearch = function() {
  searchEl.focus();
};

// --- Scroll-based lazy load ---
listEl.addEventListener('scroll', () => {
  if (rendered < filtered.length) {
    const {scrollTop, scrollHeight, clientHeight} = listEl;
    if (scrollTop + clientHeight > scrollHeight * 0.85) loadBatch();
  }
});

// --- Shared interaction controller ---
// The app drives the SAME Core.createClipController the website demo uses; the
// adapter maps each action to the exact window.api call the app already made, so
// behavior is preserved and the dispatch can no longer drift from the demo.
const appAdapter = {
  itemById: (id) => itemById(id),
  numpadMap: () => numpadMap(),
  protectedGroups: () => new Set([aiGroupName]),
  setFilterIntent: (filter, intent) => { Core.applyFilterIntent({ filters: activeFilters, excludedFilters }, filter, intent); updateClearControls(); if (controller) controller.clearSelection({ paint: false }); },
  clearFilters: () => clearSearchAndFilters(),
  focusSearch: () => searchEl.focus(),
  pin: (id) => window.api.pin(id),
  numpadAssign: (id, slot) => window.api.numpadAssign(id, slot),
  numpadUnassign: (slot) => window.api.numpadUnassign(slot),
  toggleGroup: (id, group) => window.api.groupAssign(id, group), // applyGroupAssign toggles
  createGroup: async (name) => { await window.api.groupCreate(name); await refreshGroups({ render: false }); },
  deleteGroup: async (group) => { activeFilters.delete(group); excludedFilters.delete(group); await window.api.groupDelete(group); await refreshGroups({ render: false }); },
  deleteClip: (id) => window.api.deleteItem(id),
  clearUnpinned: () => window.api.deleteAll(),
  setGroupSharedAi: (group) => window.api.setGroupSharedAi(group, !aiSharedGroups.has(group)),
  copyNumpadSlot: (id) => { const it = itemById(id); if (!it) return; return it.type === 'image' ? window.api.paste(id) : window.api.copy(it.text || ''); },
  activateClip: (id) => window.api.pasteAndHide(id),
  editClip: (id, _itemEl, options) => window.api.openEditor(id, { ...(query ? { find: query, regex: regexOn } : {}), ...(options || {}) }),
  setClipTitle: (id, title) => window.api.setClipTitle(id, title),
  openImage: (item) => window.api.openImage(itemId(item)),
  saveImage: async (item) => { const d = await window.api.copyImagePath(itemId(item)); return d && d.path ? 'Path copied' : null; },
  isSettingsOpen: () => document.getElementById('settingsView').classList.contains('show'),
  closeSettings: () => closeSettings(),
  hidePopup: () => window.api.hidePopup(),
  // --- Multi-select contract (selection state lives in the controller) ---
  visibleIds: () => filtered.map(ri => itemId(items[ri])),
  allItems: () => items,
  groupNames: () => groups,
  renderSelection: (state) => {
    // The list is lazy-loaded; make sure the focused row is in the DOM so the
    // shared painter can highlight + scroll to it.
    if (state.focusId) {
      const idx = filtered.findIndex(ri => itemId(items[ri]) === state.focusId);
      let guard = 0;
      while (idx >= 0 && idx >= rendered && rendered < filtered.length && guard++ < 1000) loadBatch();
    }
    Core.applySelectionUI({ listEl, barEl: document.getElementById('selectionBar'), state });
  },
  deleteClips: (ids) => window.api.deleteItems(ids),        // returns restorable snapshots
  restoreClips: (snaps) => window.api.restoreItems(snaps),  // re-adds + clears tombstones
  groupAssignMany: (ids, group, shouldHave) => window.api.groupAssignMany(ids, group, shouldHave),
  pasteMany: (ids) => window.api.pasteMany(ids),
  startUnify: (ids) => window.api.startUnify(ids),
  offerUndo: ({ count, undo }) => Core.showActionToast(toast, {
    message: `Deleted ${count} clip${count === 1 ? '' : 's'}`,
    actionLabel: 'Undo',
    onAction: undo,
  }),
  toast: (msg) => showToast(msg),
  render: () => rerenderList(), // view-only re-render (expand/filter): no IPC
  refresh: async () => { await refresh({ force: true }); if (document.getElementById('settingsView').classList.contains('show')) openSettings(); }, // after a mutation: re-fetch history THEN re-render settings if open (await so the settings panel reads rebuilt indexes, not stale ones)
};
controller = Core.createClipController(appAdapter);
const appDialogs = controller.dialogs;

document.addEventListener('click', (e) => controller.onClick(e));
document.addEventListener('contextmenu', (e) => controller.onContextmenu(e));

// Popup reset (called by the main process when the window is shown).
window.resetPopupState = function() {
  appDialogs.dismiss();
  controller.closeMenu(); // a popover left open at blur-hide would eat keys on re-show
  controller.clearSelection({ paint: false });
  document.getElementById('settingsView')?.classList.remove('show');
  document.getElementById('mainView')?.classList.remove('hidden');
  document.body.style.pointerEvents = '';
  window.focusSearch();
};

// Global numpad hotkey from the main process: assign the focused row's clip
// (inherits the shared replace-confirm via the controller).
window.assignNumpad = function(slot) {
  const id = controller.focusedId();
  if (id) controller.tryAssignNumpad(id, slot);
};

// Clear all (Settings)
document.getElementById('clearAll').addEventListener('click', () => controller.clearAll());
document.getElementById('copyDiagnostics').addEventListener('click', async () => {
  const diagnostics = await window.api.getSyncDiagnostics();
  await window.api.copy(JSON.stringify(diagnostics, null, 2));
  showToast('Diagnostics copied');
});

// --- Search ---
searchEl.addEventListener('keydown', e => {
  if (searchEl.value === '' && e.key >= '1' && e.key <= '9') {
    const n = +e.key;
    const nmap = numpadMap();
    if (n in nmap) {
      e.preventDefault();
      window.api.numpadPasteAndHide(n);
      return;
    }
  }
});
const searchClear = document.getElementById('searchClear');
searchEl.addEventListener('input', e => { query = e.target.value; if (controller) controller.clearSelection({ paint: false }); updateClearControls(); scheduleRerenderList(); });
searchClear.addEventListener('click', () => { clearSearchAndFilters(); searchEl.focus(); });

// --- Regex toggle ---
regexBtn.addEventListener('click', () => {
  regexOn = !regexOn;
  regexBtn.classList.toggle('active', regexOn);
  window.api.saveSettings({regex_search: regexOn});
  rerenderList();
});

// --- Keyboard nav (Escape cascade + arrows + Enter + multi-select, via the
// shared controller which now owns the selection/focus state) ---
document.addEventListener('keydown', (e) => controller.onKeydown(e));

// --- Settings ---
// macOS only: show close buttons (no reliable click-away on macOS)
if (window.api.platform === 'darwin') {
  document.getElementById('closeBtn').classList.remove('hidden');
  document.getElementById('settingsCloseBtn').classList.remove('hidden');
}
document.getElementById('settingsCloseBtn').addEventListener('click', () => window.api.hidePopup());
document.getElementById('closeBtn').addEventListener('click', () => window.api.hidePopup());
document.getElementById('settingsBtn').addEventListener('click', openSettings);
document.getElementById('settingsBack').addEventListener('click', closeSettings);

let shortcutRecording = null;
let manualSyncInFlight = false;

function setManualSyncButtons(syncing) {
  const buttons = [document.getElementById('syncHeaderBtn'), document.getElementById('syncNow')].filter(Boolean);
  for (const button of buttons) {
    button.disabled = syncing;
    button.title = syncing ? 'Syncing...' : 'Sync now';
    button.setAttribute('aria-label', button.title);
  }
}

function manualSyncResultText(result) {
  const ms = result && typeof result.ms === 'number' ? result.ms : 0;
  const elapsed = ms >= 1000 ? `${(ms / 1000).toFixed(1)}s` : `${ms}ms`;
  const changed = result && result.local_changed ? 'updated local' : result && result.wrote_remotes ? 'wrote cloud' : 'up to date';
  return `Synced: ${changed} (${elapsed})`;
}

function p2pStatusText(status) {
  if (!status || !status.enabled) return 'Off';
  if (!status.running) return 'Starting local network sync...';
  const peers = Array.isArray(status.peers) ? status.peers : [];
  if (!peers.length) return 'On; looking for nearby BoardClip devices';
  const names = peers.slice(0, 3).map(peer => peer.deviceName || 'Device').join(', ');
  const extra = peers.length > 3 ? ` +${peers.length - 3}` : '';
  return `On; ${peers.length} peer${peers.length === 1 ? '' : 's'} nearby: ${names}${extra}`;
}

function renderP2PStatus(status) {
  const statusEl = document.getElementById('p2pStatus');
  if (!statusEl) return;
  statusEl.textContent = p2pStatusText(status);
  statusEl.className = 'sync-status' + (status && status.enabled && status.running ? ' active' : '');
}

async function runManualSync({ showSettingsStatus = false } = {}) {
  if (manualSyncInFlight) return;
  manualSyncInFlight = true;
  setManualSyncButtons(true);
  const syncStatus = document.getElementById('syncStatus');
  if (showSettingsStatus && syncStatus) {
    syncStatus.textContent = 'Syncing...';
    syncStatus.className = 'sync-status active';
  }
  try {
    const result = await window.api.syncNow();
    await refresh();
    const statusText = manualSyncResultText(result);
    if (showSettingsStatus && syncStatus) {
      syncStatus.textContent = statusText;
      syncStatus.className = 'sync-status active';
      setTimeout(() => openSettings(), 500);
    } else {
      showToast(statusText);
    }
  } catch (error) {
    if (showSettingsStatus && syncStatus) {
      syncStatus.textContent = 'Sync failed';
      syncStatus.className = 'sync-status error';
    } else {
      showToast('Sync failed');
    }
  } finally {
    manualSyncInFlight = false;
    setManualSyncButtons(false);
  }
}

function shortcutLabel(accelerator) {
  return String(accelerator || '')
    .replace(/Globe|Fn/g, 'Globe')
    .replace(/CommandOrControl/g, window.api.platform === 'darwin' ? 'Cmd/Ctrl' : 'Ctrl')
    .replace(/Command/g, 'Cmd')
    .replace(/Control/g, 'Ctrl')
    .replace(/Super/g, window.api.platform === 'darwin' ? 'Cmd' : 'Win')
    .replace(/\+/g, ' + ');
}

function shortcutStatusEl(kind) {
  return document.getElementById(kind === 'quickPaste' ? 'quickPasteStatus' : 'shortcutStatus');
}

function shortcutRecordEl(kind) {
  return document.getElementById(kind === 'quickPaste' ? 'quickPasteRecord' : 'shortcutRecord');
}

function shortcutResetEl(kind) {
  return document.getElementById(kind === 'quickPaste' ? 'quickPasteReset' : 'shortcutReset');
}

function setShortcutStatus(kind, message, isError = false) {
  const status = shortcutStatusEl(kind);
  status.textContent = message || '';
  status.className = 'shortcut-status' + (isError ? ' error' : '');
}

function stopShortcutRecording({ resume = true } = {}) {
  const kind = shortcutRecording;
  shortcutRecording = null;
  for (const button of [shortcutRecordEl('show'), shortcutRecordEl('quickPaste')]) {
    if (button) button.classList.remove('recording');
  }
  if (resume && kind && window.api.resumeShortcuts) {
    window.api.resumeShortcuts().catch(() => {});
  }
  return kind;
}

function renderShortcutSettings(settings, { clearStatus = true } = {}) {
  const info = settings.shortcut_info || { show: 'CommandOrControl+Shift+V', custom: false };
  const record = shortcutRecordEl('show');
  const reset = shortcutResetEl('show');
  record.textContent = shortcutLabel(info.show);
  record.title = info.show;
  record.classList.remove('recording');
  reset.style.visibility = info.custom ? 'visible' : 'hidden';
  const quickRecord = shortcutRecordEl('quickPaste');
  const quickReset = shortcutResetEl('quickPaste');
  const quickShortcut = info.quickPaste || '';
  if (quickShortcut) {
    quickRecord.textContent = `${shortcutLabel(quickShortcut).replace(/\s\+\s[1-9]$/, '')} + 1-9`;
    quickRecord.title = `${quickShortcut.replace(/[1-9]$/, '1')} ... ${quickShortcut.replace(/[1-9]$/, '9')}`;
  } else {
    quickRecord.textContent = 'Off';
    quickRecord.title = 'Record quick paste shortcut';
  }
  quickRecord.classList.remove('recording');
  quickReset.style.visibility = info.quickPasteCustom ? 'visible' : 'hidden';
  if (clearStatus) {
    setShortcutStatus('show', '');
    setShortcutStatus('quickPaste', '');
  }
}

function shortcutKeyFromEvent(e) {
  const modifierKeys = new Set(['Alt', 'AltGraph', 'Control', 'Meta', 'Shift']);
  if (modifierKeys.has(e.key)) return '';
  if (/^Key[A-Z]$/.test(e.code)) return e.code.slice(3);
  if (/^Digit[0-9]$/.test(e.code)) return e.code.slice(5);
  if (/^Numpad[0-9]$/.test(e.code)) return `num${e.code.slice(6)}`;
  if (/^F([1-9]|1[0-9]|2[0-4])$/.test(e.key)) return e.key.toUpperCase();
  const byCode = {
    Minus: 'Minus',
    Equal: e.shiftKey ? 'Plus' : '=',
    BracketLeft: '[',
    BracketRight: ']',
    Backslash: 'Backslash',
    Semicolon: ';',
    Quote: "'",
    Backquote: '`',
    Comma: ',',
    Period: '.',
    Slash: '/',
    NumpadAdd: 'Plus',
    NumpadSubtract: 'Minus',
    NumpadMultiply: '*',
    NumpadDivide: '/',
    NumpadDecimal: '.',
  };
  if (byCode[e.code]) return byCode[e.code];
  const byKey = {
    ' ': 'Space',
    Spacebar: 'Space',
    Tab: 'Tab',
    Enter: 'Enter',
    Return: 'Enter',
    Backspace: 'Backspace',
    Delete: 'Delete',
    Insert: 'Insert',
    Home: 'Home',
    End: 'End',
    PageUp: 'PageUp',
    PageDown: 'PageDown',
    ArrowUp: 'Up',
    ArrowDown: 'Down',
    ArrowLeft: 'Left',
    ArrowRight: 'Right',
    CapsLock: 'Capslock',
    NumLock: 'Numlock',
    ScrollLock: 'Scrolllock',
    '+': 'Plus',
    '-': 'Minus',
  };
  return byKey[e.key] || '';
}

function shortcutFromEvent(e) {
  const mods = [];
  if (e.metaKey) mods.push(window.api.platform === 'darwin' ? 'Command' : 'Super');
  if (e.ctrlKey) mods.push('Control');
  if (e.altKey) mods.push('Alt');
  if (e.shiftKey) mods.push('Shift');
  const key = shortcutKeyFromEvent(e);
  if (!key || !mods.length) return '';
  return [...mods, key].join('+');
}

async function applyShortcut(kind, shortcut) {
  stopShortcutRecording({ resume: false });
  const result = kind === 'quickPaste'
    ? await window.api.setQuickPasteShortcut(shortcut)
    : await window.api.setShowShortcut(shortcut);
  if (!result || !result.ok) {
    const settings = await window.api.getSettings().catch(() => null);
    if (settings) renderShortcutSettings(settings, { clearStatus: false });
    setShortcutStatus(kind, result && result.error ? result.error : 'Shortcut was not saved.', true);
    return;
  }
  const settings = await window.api.getSettings();
  renderShortcutSettings(settings);
}

async function startShortcutRecording(kind) {
  stopShortcutRecording();
  if (window.api.suspendShortcuts) {
    await window.api.suspendShortcuts().catch(() => {});
  }
  shortcutRecording = kind;
  const record = shortcutRecordEl(kind);
  record.classList.add('recording');
  record.textContent = 'Press keys';
  setShortcutStatus(kind, '');
}

document.getElementById('shortcutRecord').addEventListener('click', () => startShortcutRecording('show'));
document.getElementById('quickPasteRecord').addEventListener('click', () => startShortcutRecording('quickPaste'));
document.getElementById('shortcutReset').addEventListener('click', () => applyShortcut('show', ''));
document.getElementById('quickPasteReset').addEventListener('click', () => applyShortcut('quickPaste', ''));

document.addEventListener('keydown', async (e) => {
  if (!shortcutRecording) return;
  const kind = shortcutRecording;
  e.preventDefault();
  e.stopPropagation();
  if (e.key === 'Escape') {
    stopShortcutRecording();
    const settings = await window.api.getSettings().catch(() => null);
    if (settings) renderShortcutSettings(settings);
    return;
  }
  const shortcut = shortcutFromEvent(e);
  if (!shortcut) {
    setShortcutStatus(kind, shortcutKeyFromEvent(e) ? 'Add a shortcut modifier.' : 'Press a non-modifier key.', true);
    return;
  }
  const resolved = kind === 'show' && window.api.resolveShowShortcut
    ? await window.api.resolveShowShortcut(shortcut)
    : shortcut;
  await applyShortcut(kind, resolved);
}, true);

function shortCommit(sha) {
  return sha ? String(sha).slice(0, 7) : '';
}

function updateUnavailableText(reason) {
  switch (reason) {
    case 'dirty-checkout':
      return 'Source checkout has local changes; run the public update command';
    case 'not-git-checkout':
      return 'Packaged build; source auto-update unavailable';
    case 'missing-update-script':
      return 'Source update script missing';
    case 'unknown-build':
      return 'Build commit unknown';
    default:
      return 'Source auto-update unavailable';
  }
}

function updateStatusText(result) {
  const latest = shortCommit(result && result.latest);
  switch (result && result.status) {
    case 'current':
      return 'Up to date';
    case 'updating':
      return latest ? `Updating to ${latest}...` : 'Updating...';
    case 'reloaded':
      return latest ? `Updated UI to ${latest}` : 'Updated UI';
    case 'relaunching':
      return latest ? `Updated to ${latest}; relaunching...` : 'Updated; relaunching...';
    case 'unsupported':
      return updateUnavailableText(result && result.reason);
    case 'busy':
      return 'Update check already running';
    case 'error':
      return result.error ? `Update check failed: ${result.error}` : 'Update check failed';
    default:
      return 'Could not determine latest version';
  }
}

function setUpdateStatus(message, state = '') {
  const updateStatus = document.getElementById('updateStatus');
  updateStatus.textContent = message || '';
  updateStatus.className = `settings-status${state ? ` ${state}` : ''}`;
}

function renderUpdateSettings(settings) {
  const support = settings.runtime_info && settings.runtime_info.update_support || {};
  const supported = !!(settings.runtime_info && settings.runtime_info.auto_update);
  const updateBuild = document.getElementById('updateBuild');
  const updateDetail = document.getElementById('updateDetail');
  const updateNow = document.getElementById('updateNow');
  const label = settings.build_info && settings.build_info.label ? settings.build_info.label : 'unknown';
  updateBuild.textContent = `Build ${label}`;
  updateDetail.textContent = supported
    ? 'Source auto-update enabled; requires Git; checks startup + every 4h'
    : updateUnavailableText(support.reason);
  updateNow.disabled = !supported;
  setUpdateStatus('', '');
}

document.getElementById('updateNow').addEventListener('click', async () => {
  const updateNow = document.getElementById('updateNow');
  updateNow.disabled = true;
  setUpdateStatus('Checking...', 'active');
  try {
    const result = await window.api.checkForUpdates();
    const state = result.ok || result.status === 'busy' ? 'active' : 'error';
    setUpdateStatus(updateStatusText(result), state);
    if (result.status !== 'updating') updateNow.disabled = false;
  } catch (error) {
    setUpdateStatus(`Update check failed: ${error && error.message ? error.message : 'unknown error'}`, 'error');
    updateNow.disabled = false;
  }
});

const VARIANT_SETTING_KEYS = { surfaceStyle: 'surface_style', accentVariant: 'accent_variant', uiDensity: 'ui_density', uiCorners: 'ui_corners', uiBorders: 'ui_borders' };
function renderAppearanceVariants(s) {
  const host = document.getElementById('appearanceVariants');
  if (!host) return;
  host.innerHTML = '';
  const rt = s.runtime_info || {};
  // Surface ships as a real setting; the rest are dev-only auditioning knobs.
  const fields = rt.debug_variants
    ? ['surfaceStyle', 'accentVariant', 'uiDensity', 'uiCorners', 'uiBorders']
    : ['surfaceStyle'];
  const switcher = Core.createVariantSwitcher({
    fields,
    initial: {
      surfaceStyle: s.surface_style || 'auto',
      accentVariant: s.accent_variant || 'blue',
      uiDensity: s.ui_density || 'normal',
      uiCorners: s.ui_corners || 'soft',
      uiBorders: s.ui_borders || 'bordered',
    },
    onChange: (next, key) => {
      window.api.saveSettings({ [VARIANT_SETTING_KEYS[key]]: next[key] });
      // Non-surface axes apply instantly; surface waits for main's OS-resolved
      // broadcast (onSurfaceChanged) so unsupported systems stay solid.
      Core.applyVariants(document.documentElement, {
        accentVariant: next.accentVariant, uiDensity: next.uiDensity, uiCorners: next.uiCorners, uiBorders: next.uiBorders,
      });
    },
  });
  host.appendChild(switcher.el);
}

async function openSettings() {
  const s = await window.api.getSettings();
  const autoLaunchEl = document.getElementById('autoLaunch');
  autoLaunchEl.checked = await window.api.getAutoLaunch();
  autoLaunchEl.onchange = (e) => window.api.setAutoLaunch(e.target.checked);
  setThemeMode(s.theme_mode || themeMode);
  document.getElementById('themeMode').onclick = (e) => {
    const btn = e.target.closest('[data-theme-mode]');
    if (!btn) return;
    setThemeMode(btn.dataset.themeMode);
    window.api.saveSettings({ theme_mode: btn.dataset.themeMode });
  };
  renderAppearanceVariants(s);
  renderShortcutSettings(s);
  const maxAgeEl = document.getElementById('maxAge');
  const maxSizeEl = document.getElementById('maxSize');
  maxAgeEl.value = s.max_age_days;
  maxSizeEl.value = s.max_size_gb;
  maxAgeEl.onchange = () => window.api.saveSettings({ max_age_days: parseInt(maxAgeEl.value) || 7 });
  maxSizeEl.onchange = () => window.api.saveSettings({ max_size_gb: parseFloat(maxSizeEl.value) || 10 });
  const diagnosticsEl = document.getElementById('diagnosticsEnabled');
  const diagnosticsStatus = document.getElementById('diagnosticsStatus');
  const diagnosticsFile = s.runtime_info && s.runtime_info.diagnostics_file || '';
  const updateDiagnosticsStatus = () => {
    diagnosticsStatus.textContent = diagnosticsEnabled ? 'Writing performance log' : 'Off';
    diagnosticsStatus.title = diagnosticsEnabled ? diagnosticsFile : '';
    diagnosticsStatus.className = `settings-status${diagnosticsEnabled ? ' active' : ''}`;
  };
  diagnosticsEnabled = !!s.diagnostics_enabled;
  diagnosticsEl.checked = diagnosticsEnabled;
  updateDiagnosticsStatus();
  diagnosticsEl.onchange = async (e) => {
    diagnosticsEnabled = !!e.target.checked;
    await window.api.saveSettings({ diagnostics_enabled: diagnosticsEnabled });
    updateDiagnosticsStatus();
  };
  regexOn = s.regex_search || false;
  regexBtn.classList.toggle('active', regexOn);
  const bytes = s.storage_bytes || 0;
  const mb = (bytes / 1048576).toFixed(1);
  document.getElementById('usage').textContent = `Current: ${s.item_count} items, ${mb} MB`;

  // Native cloud providers are default-on; toggles are local opt-outs.
  const syncList = document.getElementById('syncAccounts');
  const accounts = await window.api.getCloudAccounts();
  syncList.innerHTML = '';
  for (const acc of accounts) {
    const row = document.createElement('label');
    row.className = 'sync-account';
    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.dataset.syncPath = acc.path;
    checkbox.checked = !!acc.enabled;
    const main = document.createElement('span');
    main.className = 'sync-account-main';
    const label = document.createElement('span');
    label.className = 'sync-provider';
    label.title = syncAccountLabel(acc);
    label.textContent = syncAccountLabel(acc);
    const pathLabel = document.createElement('span');
    pathLabel.className = 'sync-account-path';
    pathLabel.title = acc.path;
    pathLabel.textContent = acc.path;
    main.append(label, pathLabel);
    row.append(checkbox, main);
    syncList.appendChild(row);
  }
  if (!accounts.length) {
    syncList.innerHTML = '<div class="sync-status">No native cloud folders detected</div>';
  }
  const enabledAccounts = accounts.filter(acc => acc.enabled);
  const syncStatus = document.getElementById('syncStatus');
  syncStatus.textContent = accounts.length ? `${enabledAccounts.length}/${accounts.length} providers enabled; syncs on change + every 30s` : '';
  syncStatus.className = 'sync-status' + (enabledAccounts.length ? ' active' : '');
  const p2pEnabledEl = document.getElementById('p2pEnabled');
  const p2pRuntime = s.runtime_info && s.runtime_info.p2p || { enabled: !!s.p2p_enabled };
  p2pEnabledEl.checked = !!p2pRuntime.enabled;
  renderP2PStatus(p2pRuntime);
  p2pEnabledEl.onchange = async (event) => {
    const nextEnabled = !!event.target.checked;
    renderP2PStatus({ enabled: nextEnabled, running: false, peers: [] });
    const status = await window.api.setP2PEnabled(nextEnabled);
    renderP2PStatus(status);
  };
  renderUpdateSettings(s);
  const buildInfoEl = document.getElementById('buildInfo');
  buildInfoEl.innerHTML = '';
  if (s.runtime_info && s.runtime_info.app_dir) {
    const line = document.createElement('span');
    line.className = 'build-info-line';
    line.title = s.runtime_info.app_dir;
    line.textContent = `App ${s.runtime_info.app_dir}`;
    buildInfoEl.appendChild(line);
  }

  // Numpad slots
  const slotsEl = document.getElementById('numpadSlots');
  const nmap = numpadMap();
  slotsEl.innerHTML = '';
  for (let n = 1; n <= 9; n++) {
    const has = n in nmap;
    const it = has ? itemById(nmap[n]) : null;
    const text = it ? (it.type === 'image' ? '[image]' : (it.text||'').replace(/\n/g,' ').slice(0,60)) : '';
    slotsEl.innerHTML += `<div class="np-slot${has?' has-content':''}" data-slot-id="${has ? esc(nmap[n]) : ''}">
      <span class="np-num">${n}</span>
      <span class="np-text${has?'':' empty'}">${has ? esc(text) : 'empty'}</span>
      ${has ? `<button class="icon-btn np-remove" data-slot="${n}" title="Unassign"><span class="mi">close</span></button>` : ''}
    </div>`;
  }
  // np-remove (unassign) + np-slot.has-content (copy) are handled by the shared
  // controller's settings dispatch.

  // AI Access (renders before groups so the shared-group set is ready)
  await renderAiAccess();
  await renderConflicts();

  // Group slots
  const groupsEl = document.getElementById('groupSlots');
  groupsEl.innerHTML = '';
  groups.forEach(g => {
    const count = groupCounts.get(g) || 0;
    const shared = aiSharedGroups.has(g);
    const isAiGroup = g === aiGroupName;
    groupsEl.innerHTML += `<div class="group-slot">
      <span class="gp-name">${esc(g)}</span>
      <span class="gp-count">${count} item${count!==1?'s':''}</span>
      <button class="icon-btn gp-share${shared?' on':''}" data-group="${esc(g)}" title="${shared?'Shared with AI - click to stop sharing':'Share this group with AI'}"><span class="mi">smart_toy</span></button>
      <button class="icon-btn gp-del${isAiGroup?' locked':''}" data-group="${esc(g)}" title="Delete group"><span class="mi">close</span></button>
    </div>`;
  });
  // gp-share (toggle AI sharing) + gp-del (delete group, with the shared confirm)
  // are handled by the shared controller's settings dispatch.

  document.getElementById('mainView').classList.add('hidden');
  document.getElementById('settingsView').classList.add('show');
}

async function renderConflicts() {
  const section = document.getElementById('conflictsSection');
  const wrap = document.getElementById('conflictSlots');
  if (!section || !wrap || !window.api.getConflicts) return;
  const conflicts = await window.api.getConflicts().catch(() => []);
  section.classList.toggle('hidden', !conflicts.length);
  wrap.innerHTML = '';
  for (const conflict of conflicts) {
    const leftTitle = Core.titleOf(conflict.left) || (conflict.left && conflict.left.text || '').replace(/\s+/g, ' ').slice(0, 44);
    const rightTitle = Core.titleOf(conflict.right) || (conflict.right && conflict.right.text || '').replace(/\s+/g, ' ').slice(0, 44);
    const row = document.createElement('div');
    row.className = 'settings-action-card';
    row.innerHTML = `<span class="settings-action-main">
      <span class="settings-action-title">${esc(conflict.kind || 'merge')} conflict</span>
      <span class="settings-action-detail">${esc(leftTitle || 'Current')} <-> ${esc(rightTitle || 'Incoming')}</span>
    </span>
    <button class="settings-icon-btn" data-conflict-id="${esc(conflict.id)}" title="Resolve"><span class="mi sm mid">compare_arrows</span></button>`;
    wrap.appendChild(row);
  }
  wrap.onclick = (event) => {
    const btn = event.target.closest('[data-conflict-id]');
    if (!btn) return;
    window.api.openConflict(btn.dataset.conflictId);
  };
}

function closeSettings() {
  document.getElementById('settingsView').classList.remove('show');
  document.getElementById('mainView').classList.remove('hidden');
  searchEl.focus();
}

// --- AI Access (MCP) ---
let aiSharedGroups = new Set();
let aiGroupName = 'AI';

async function renderAiAccess() {
  const st = await window.api.getAiAccess().catch(() => null);
  if (!st) return;
  applyAiAccess(st);
  document.getElementById('aiAccessEnabled').onchange = async (e) => {
    document.getElementById('aiAccessStatus').textContent = e.target.checked ? 'Starting…' : 'Turning off…';
    const next = await window.api.setAiAccessEnabled(e.target.checked).catch(() => null);
    if (next) { await refreshGroupsAndList(); openSettings(); }
  };
  document.getElementById('aiTimeout').onchange = async (e) => {
    const next = await window.api.setAiApprovalTimeout(parseInt(e.target.value) || 60).catch(() => null);
    if (next) applyAiAccess(next);
  };
  document.getElementById('aiMoreClients').onclick = () => {
    document.getElementById('aiClientsMore').classList.toggle('hidden');
  };
}

function applyAiAccess(st) {
  aiSharedGroups = new Set(st.sharedGroups || []);
  aiGroupName = st.aiGroup || 'AI';
  document.getElementById('aiAccessEnabled').checked = !!st.enabled;
  document.getElementById('aiAccessBody').classList.toggle('hidden', !st.enabled);
  const statusEl = document.getElementById('aiAccessStatus');
  statusEl.textContent = st.enabled ? (st.running ? 'Active - assistants can connect' : 'Enabled') : 'Off';
  statusEl.className = 'settings-status' + (st.enabled ? ' active' : '');
  document.getElementById('aiTimeout').value = st.timeoutSec;
  renderAiClients(st);
  renderAiAlwaysAllow(st);
}

function aiClientRow(c) {
  const row = document.createElement('label');
  row.className = 'ai-client-row' + (c.detected ? '' : ' undetected');
  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.checked = !!c.enabled;
  cb.onchange = async () => {
    const next = await window.api.setMcpClientEnabled(c.id, cb.checked).catch(() => null);
    if (next) applyAiAccess(next);
  };
  const dot = document.createElement('span');
  dot.className = 'ai-dot' + (c.enabled ? ' on' : '');
  const name = document.createElement('span');
  name.className = 'ai-client-name';
  name.textContent = c.label + (c.detected ? '' : ' (not detected)');
  row.append(cb, dot, name);
  return row;
}

function renderAiClients(st) {
  const clients = st.clients || [];
  const detected = clients.filter(c => c.detected);
  const undetected = clients.filter(c => !c.detected);
  const wrap = document.getElementById('aiClients');
  wrap.innerHTML = '';
  if (!detected.length) wrap.innerHTML = '<div class="settings-status">No AI clients detected on this machine.</div>';
  detected.forEach(c => wrap.appendChild(aiClientRow(c)));
  const moreWrap = document.getElementById('aiClientsMore');
  moreWrap.innerHTML = '';
  undetected.forEach(c => moreWrap.appendChild(aiClientRow(c)));
  const moreBtn = document.getElementById('aiMoreClients');
  if (undetected.length) { moreBtn.classList.remove('hidden'); moreBtn.textContent = `More clients (${undetected.length})`; }
  else { moreBtn.classList.add('hidden'); moreWrap.classList.add('hidden'); }
}

function renderAiAlwaysAllow(st) {
  const head = document.getElementById('aiAlwaysHead');
  const wrap = document.getElementById('aiAlwaysAllow');
  wrap.innerHTML = '';
  const grants = st.alwaysAllow || [];
  head.classList.toggle('hidden', !grants.length);
  grants.forEach(tool => {
    const row = document.createElement('div');
    row.className = 'ai-grant-row';
    const name = document.createElement('span');
    name.className = 'ai-grant-name';
    name.textContent = tool;
    const btn = document.createElement('button');
    btn.className = 'icon-btn danger';
    btn.title = 'Revoke';
    btn.innerHTML = '<span class="mi">close</span>';
    btn.onclick = async () => { const next = await window.api.revokeAiAlwaysAllow(tool).catch(() => null); if (next) applyAiAccess(next); };
    row.append(name, btn);
    wrap.appendChild(row);
  });
}

if (window.api && window.api.onAiAccessChanged) {
  window.api.onAiAccessChanged(() => {
    if (document.getElementById('settingsView').classList.contains('show')) renderAiAccess();
  });
}


// --- Groups refresh ---
async function refreshGroups({render = true} = {}) {
  const startedAt = performance.now();
  try {
    const s = await window.api.getSettings();
    groups = s.groups || [];
    diagnosticsEnabled = !!s.diagnostics_enabled;
    if (render) renderGroupFilters();
    recordRendererPerf('settings.refresh_groups', startedAt, { groups: groups.length, render }, 75);
  } catch {}
}

async function refreshGroupsAndList() {
  await refreshGroups({render: false});
  await refresh({force: true});
}

// --- Data refresh ---
async function refresh({force = false} = {}) {
  const startedAt = performance.now();
  try {
    const state = window.api.getHistoryState ? await window.api.getHistoryState() : {revision: Date.now(), items: await window.api.getHistory()};
    const data = state.items || [];
    const changed = state.revision !== dataRevision;
    if (changed) {
      dataRevision = state.revision;
      items = data;
      rebuildItemIndexes();
    }
    if (changed || force) rerenderList();
    recordRendererPerf('history.refresh', startedAt, { changed, force, revision: state.revision }, 100);
  } catch {}
}

// Initial load + poll
refreshGroupsAndList();
if (window.api.onHistoryChanged) {
  window.api.onHistoryChanged(() => refreshGroupsAndList());
} else {
  setInterval(refresh, 1000);
}

  refreshGroupsAndList();

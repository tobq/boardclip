<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Approve AI action</title>
<script>
  document.documentElement.dataset.theme = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
</script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL@20..48,400,1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="site/shared/clipboard-tokens.css">
<style>
  /* Palette + tokens come from the shared clipboard-tokens.css so the modal can
     never drift from the app. Only the modal's own layout lives here, and it
     rides the same spacing/type/radius scale + borderless buttons as the popup. */
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background:var(--surface); }
  body { font-family:system-ui,'Segoe UI',sans-serif; color:var(--text); user-select:none; overflow:hidden; }
  .bar { -webkit-app-region:drag; height:24px; display:flex; align-items:center; padding:0 var(--sp-7); color:var(--text-dim); font-size:var(--fs-1); letter-spacing:.06em; text-transform:uppercase; }
  .wrap { padding:var(--sp-1) var(--sp-8) var(--sp-6); display:flex; flex-direction:column; gap:var(--sp-5); }
  .head { display:flex; gap:var(--sp-5); align-items:flex-start; }
  .badge { width:34px; height:34px; border-radius:var(--r-3); flex-shrink:0; display:flex; align-items:center; justify-content:center;
           background:var(--accent-bg); color:var(--accent); }
  .badge .mi { font-family:'Material Symbols Rounded'; font-size:var(--icon-lg); line-height:1; }
  .badge.danger { background:var(--red-bg); color:var(--red); }
  h1 { font-size:var(--fs-5); font-weight:600; line-height:1.3; }
  .who { font-size:var(--fs-2); color:var(--text-dim); margin-top:var(--sp-1); line-height:1.4; }
  .who b { color:var(--text); font-weight:600; }
  .card { background:var(--bg); border-radius:var(--r-3); padding:var(--sp-4) var(--sp-5); }
  .card .label { font-size:var(--fs-1); text-transform:uppercase; letter-spacing:.06em; color:var(--text-dim); margin-bottom:var(--sp-2); }
  .detail { font-family:var(--font-mono); font-size:var(--fs-2); line-height:1.5; color:var(--text);
            white-space:pre-wrap; word-break:break-word; max-height:96px; overflow:auto; }
  .detail.empty { color:var(--text-dim); font-style:italic; font-family:inherit; }
  .meter { height:3px; border-radius:var(--r-pill); background:var(--line); overflow:hidden; }
  .meter > span { display:block; height:100%; width:100%; background:var(--accent); transition:width 1s linear; }
  .meter.danger > span { background:var(--red); }
  .countdown { font-size:var(--fs-1); color:var(--text-dim); display:flex; justify-content:space-between; margin-top:var(--sp-3); }
  .acts { display:flex; flex-direction:column; gap:var(--sp-3); margin-top:var(--sp-1); }
  .row2 { display:flex; gap:var(--sp-3); }
  button { font:inherit; border:none; border-radius:var(--r-2); cursor:pointer; transition:var(--dur) var(--ease); background:var(--surface2); color:var(--text); }
  .primary { padding:var(--sp-4); font-size:var(--fs-3); font-weight:600; background:var(--accent); color:var(--active-fg); }
  .primary:hover { background:var(--accent-hover); }
  .primary.danger { background:var(--red); }
  .primary.danger:hover { filter:brightness(1.08); }
  .row2 button { flex:1; padding:var(--sp-3); font-size:var(--fs-2); font-weight:500; color:var(--text-dim); }
  .row2 button:hover { background:var(--menu-hover); color:var(--text); }
  .deny { padding:var(--sp-3); font-size:var(--fs-2); font-weight:500; color:var(--text-dim); }
  .deny:hover { color:var(--red); background:var(--red-bg); }
</style></head>
<body>
  <div class="bar">BoardClip - AI action</div>
  <div class="wrap" id="wrap">
    <div class="head">
      <div class="badge" id="badge"><span class="mi" id="badgeIcon">smart_toy</span></div>
      <div>
        <h1 id="title">An AI assistant wants to act</h1>
        <div class="who"><b id="client">an AI assistant</b> requested this via BoardClip's MCP server.</div>
      </div>
    </div>
    <div class="card" id="detailCard">
      <div class="label" id="detailLabel">What it will do</div>
      <div class="detail" id="detail"></div>
    </div>
    <div>
      <div class="meter" id="meter"><span id="meterBar"></span></div>
      <div class="countdown"><span>Denies automatically if you don't respond</span><span id="countNum"></span></div>
    </div>
    <div class="acts">
      <button class="primary" id="allowOnce">Allow once</button>
      <div class="row2">
        <button id="allowSession">This session</button>
        <button id="allowAlways">Always allow</button>
      </div>
      <button class="deny" id="deny">Deny</button>
    </div>
  </div>

<script>
  const $ = id => document.getElementById(id);
  let current = null, remaining = 60, timer = null, decided = false;
  const ICONS = {
    delete_clip:'delete', copy_to_clipboard:'content_paste', paste_clip:'content_paste_go',
    add_clip:'add', pin_clip:'push_pin', set_numpad:'dialpad', assign_group:'folder',
    create_group:'create_new_folder', delete_group:'folder_delete', read_clip:'lock_open',
    search_all:'search', image_path:'image',
  };

  if (window.approval.onSettings) window.approval.onSettings(s => {
    const root = document.documentElement;
    if (s.theme === 'light' || s.theme === 'dark') root.dataset.theme = s.theme;
    const setv = (attr, val, def) => { if (val && val !== def) root.setAttribute(attr, val); else root.removeAttribute(attr); };
    setv('data-accent', s.accent, 'blue');
    setv('data-density', s.density, 'normal');
    setv('data-corners', s.corners, 'soft');
    setv('data-borders', s.borders, 'bordered');
  });

  function fit() {
    const h = Math.ceil(document.getElementById('wrap').getBoundingClientRect().bottom) + 4;
    if (window.approval && window.approval.resize) window.approval.resize(h);
  }
  function decide(choice) {
    if (decided || !current) return;
    decided = true;
    if (timer) clearInterval(timer);
    window.approval.decide(current.id, choice);
  }
  function tick() {
    remaining -= 1;
    $('countNum').textContent = remaining + 's';
    $('meterBar').style.width = Math.max(0, (remaining / (current.timeoutSec || 60)) * 100) + '%';
    if (remaining <= 0) decide('timeout');
  }

  window.approval.onRequest(req => {
    current = req;
    remaining = req.timeoutSec || 60;
    const danger = !!req.danger;
    $('title').textContent = req.title || 'An AI assistant wants to act';
    $('client').textContent = req.client || 'an AI assistant';
    $('badgeIcon').textContent = ICONS[req.tool] || 'smart_toy';
    $('badge').classList.toggle('danger', danger);
    $('meter').classList.toggle('danger', danger);
    $('allowOnce').classList.toggle('danger', danger);
    const detail = (req.detail || '').trim();
    // No preview to show -> hide the whole card rather than show an empty placeholder.
    if (detail) { $('detail').textContent = detail; $('detailCard').style.display = ''; }
    else { $('detailCard').style.display = 'none'; }
    $('countNum').textContent = remaining + 's';
    timer = setInterval(tick, 1000);
    requestAnimationFrame(fit);
  });

  $('allowOnce').onclick = () => decide('once');
  $('allowSession').onclick = () => decide('session');
  $('allowAlways').onclick = () => decide('always');
  $('deny').onclick = () => decide('deny');
  window.addEventListener('keydown', e => { if (e.key === 'Escape') decide('deny'); if (e.key === 'Enter') decide('once'); });
</script>
</body></html>

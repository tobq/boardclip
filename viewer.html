<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Image</title>
<script>
  document.documentElement.dataset.theme = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
</script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
<link rel="stylesheet" href="site/shared/clipboard-popup.css">
<style>
  /* Viewer window shell only; the viewer itself + theme vars come from the
     shared clipboard-popup.css + Core.createImageViewer (single source). */
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; overflow:hidden; }
  body { font-family:system-ui,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); }
  :root[data-surface="glass"] body { background:transparent; }
  :root[data-surface="glass"] body::before {
    content:""; position:fixed; inset:0; z-index:-1; background:var(--glass-tint);
    backdrop-filter:var(--glass-blur); -webkit-backdrop-filter:var(--glass-blur);
  }
  @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
    :root[data-surface="glass"] body { background:var(--surface); }
    :root[data-surface="glass"] body::before { display:none; }
  }
  #viewerHost { height:100%; }
</style></head><body>
<div id="viewerHost"></div>
<div class="toast" id="toast">Copied</div>
<script src="site/shared/clip-search.js"></script>
<script src="site/shared/clipboard-ui-core.js"></script>
<script>
const Core = window.BoardClipCore;
const host = document.getElementById('viewerHost');
const toast = document.getElementById('toast');
let toastTimer = null;
function showToast(msg) { toast.textContent = msg || 'Copied'; toast.classList.add('show'); clearTimeout(toastTimer); toastTimer = setTimeout(() => toast.classList.remove('show'), 1200); }

// Theme: follow the app's theme_mode setting + live system changes (same as editor.html).
let themeMode = 'system';
let systemDark = matchMedia('(prefers-color-scheme: dark)').matches;
function refreshTheme() { Core.applyTheme(document.documentElement, themeMode, systemDark); }
if (window.viewerApi.getColorScheme) window.viewerApi.getColorScheme().then((s) => { systemDark = s !== 'light'; refreshTheme(); }).catch(() => {});
if (window.viewerApi.onColorSchemeChanged) window.viewerApi.onColorSchemeChanged((s) => { systemDark = s !== 'light'; refreshTheme(); });

let viewer = null;
let clipId = null;
// Light state snapshot backing the shared clip menu (items for numpad previews,
// groups tree, pin state). Refetched right before the menu opens + after every
// mutation, so it is always current without a live push channel.
let state = { item: null, items: [], groups: [], aiGroup: 'AI' };
async function refreshState() {
  state = await window.viewerApi.state();
  if (state && state.item && viewer) viewer.setTitle(Core.titleOf(state.item) || 'Image');
}

// The SAME shared controller the popup uses drives the menu dispatch (pin/
// group/numpad/rename/delete/save/open-external), against an adapter backed by
// the viewer IPC. context 'viewer' swaps "Open image" for "Open externally".
const adapter = {
  menuContext: 'viewer',
  itemById: (id) => state.items.find((it) => Core.itemId(it) === id) || null,
  allItems: () => state.items,
  groupNames: () => state.groups,
  numpadMap: () => Core.numpadMap(state.items),
  protectedGroups: () => new Set([state.aiGroup]),
  pin: (id) => window.viewerApi.pin(id),
  toggleGroup: (id, group) => window.viewerApi.groupAssign(id, group),
  createGroup: (name) => window.viewerApi.groupCreate(name),
  numpadAssign: (id, slot) => window.viewerApi.numpadAssign(id, slot),
  numpadUnassign: (slot) => window.viewerApi.numpadUnassign(slot),
  setClipTitle: (id, title) => window.viewerApi.setClipTitle(id, title),
  // Delete closes the window (the popup shows the Undo toast on its side).
  deleteClips: async (ids) => { await window.viewerApi.deleteItems(ids); window.viewerApi.close(); return []; },
  openImageExternal: (item) => window.viewerApi.openImageExternal(Core.itemId(item)),
  saveImage: async (item) => { const d = await window.viewerApi.copyImagePath(Core.itemId(item)); return d && d.path ? 'Path copied' : null; },
  toast: (msg) => showToast(msg),
  render: () => {},
  refresh: () => refreshState(),
};
const controller = Core.createClipController(adapter);
document.addEventListener('click', (e) => controller.onClick(e));

async function openMenu(x, y) {
  await refreshState();
  if (!state.item) return;
  controller.openClipMenu(Core.itemId(state.item), x, y);
}

window.viewerApi.onInit(async (init) => {
  themeMode = (init.themeMode === 'light' || init.themeMode === 'dark') ? init.themeMode : 'system';
  refreshTheme();
  Core.applyVariants(document.documentElement, {
    surfaceStyle: init.surfaceStyle, accentVariant: init.accentVariant, uiDensity: init.uiDensity, uiCorners: init.uiCorners, uiBorders: init.uiBorders,
  });
  clipId = init.id;
  host.innerHTML = '';
  viewer = Core.createImageViewer({
    src: init.src,
    title: init.title || 'Image',
    onMenu: (x, y) => openMenu(x, y),
    onClose: () => window.viewerApi.close(),
  });
  host.appendChild(viewer.el);
  viewer.focus();
  refreshState();
});

// Right-click anywhere → the same clip menu (parity with popup rows).
document.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  openMenu(e.clientX, e.clientY);
});
// Escape falls through the viewer root (its handler covers the stage); catch
// stray focus targets here too. Dialogs/menu capture their own Escape first.
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { e.preventDefault(); window.viewerApi.close(); }
});
</script>
</body></html>
